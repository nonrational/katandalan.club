<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Kat &amp; Alan Club</title>
<meta name="description" content="The Kat & Alan Club — established New York, 2018, with a chapter in California." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --green-900:#0a2017; --green-700:#163a2c;
    --brass:#cda434; --brass-bright:#e7c869; --brass-deep:#9c7b1e;
    --cream:#f3ead2; --cream-dim:#cdc3a8; --oxblood:#5e1f1f;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:'EB Garamond', Georgia, serif; background:var(--green-900);
    color:var(--cream); min-height:100vh; overflow-x:hidden; position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* animated gradient wash — jewel tones, just a whisper of gold */
  .bg, .bg2{ position:fixed; inset:-25%; z-index:0; pointer-events:none; }
  .bg{
    background:
      radial-gradient(42% 52% at 18% 22%, rgba(31,107,77,.85), transparent 70%),
      radial-gradient(46% 56% at 82% 18%, rgba(31,94,107,.55), transparent 70%),
      radial-gradient(52% 60% at 78% 82%, rgba(124,42,94,.5), transparent 70%),
      radial-gradient(48% 58% at 22% 86%, rgba(31,94,107,.55), transparent 70%),
      radial-gradient(130% 130% at 50% 0%, var(--green-700), var(--green-900) 72%);
    animation:drift 26s ease-in-out infinite alternate;
  }
  .bg2{
    background:
      radial-gradient(40% 50% at 70% 30%, rgba(205,164,52,.16), transparent 65%),
      radial-gradient(45% 55% at 25% 60%, rgba(94,31,31,.4), transparent 65%),
      radial-gradient(40% 50% at 60% 85%, rgba(31,107,77,.42), transparent 65%);
    animation:drift2 32s ease-in-out infinite alternate; mix-blend-mode:screen;
  }
  @keyframes drift{ 0%{transform:translate3d(-3%,-2%,0) scale(1.05)} 100%{transform:translate3d(3%,2%,0) scale(1.12)} }
  @keyframes drift2{ 0%{transform:translate3d(4%,2%,0) scale(1.1) rotate(2deg)} 100%{transform:translate3d(-4%,-3%,0) scale(1.18) rotate(-2deg)} }

  body::after{
    content:""; position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(135% 115% at 50% 38%, transparent 48%, rgba(0,0,0,.5) 100%);
    mix-blend-mode:multiply;
  }
  .grain{
    position:fixed; inset:-50%; z-index:2; pointer-events:none; opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation:grain 8s steps(8) infinite;
  }
  @keyframes grain{ 0%,100%{transform:translate(0,0)} 30%{transform:translate(3%,-2%)} 50%{transform:translate(-2%,4%)} 70%{transform:translate(4%,2%)} }

  /* confetti sprinkles */
  .sprinkles{ position:fixed; inset:0; z-index:2; pointer-events:none; overflow:hidden; }
  .spr{ position:absolute; top:-24px; width:5px; height:14px; border-radius:6px; opacity:0; animation:fall linear infinite; }
  @keyframes fall{ 0%{transform:translateY(0) rotate(0);opacity:0} 8%{opacity:.95} 92%{opacity:.9} 100%{transform:translateY(112vh) rotate(720deg);opacity:0} }

  .burst-spr{ position:fixed; z-index:90; pointer-events:none; border-radius:6px; transform-origin:center; animation:burst-anim .8s cubic-bezier(.1,.8,.3,1) forwards; }
  @keyframes burst-anim { 0%{transform:translate(-50%,-50%) rotate(0deg) scale(1);opacity:1} 100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) rotate(var(--rot)) scale(.6);opacity:0} }

  .wrap{
    position:relative; z-index:3; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:2.5rem 1.5rem 11rem; gap:1.1rem;
  }

  /* crest — static logo, no interaction */
  .crest{
    width:clamp(220px,44vw,310px); aspect-ratio:1;
    opacity:0; transform:scale(.85); animation:pop 1.1s cubic-bezier(.2,.8,.25,1) forwards .2s;
    filter:drop-shadow(0 16px 34px rgba(0,0,0,.5));
  }
  .crest svg{ width:100%; height:100%; display:block; }
  .crest .ring-text{ transform-origin:center; animation:spin 70s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg) } }

  .title{
    font-family:'Cinzel Decorative', serif; font-weight:900; line-height:.98;
    font-size:clamp(2.4rem,7.5vw,4.9rem); margin-top:.3rem;
    background:linear-gradient(180deg,#fff5db,var(--brass-bright) 55%,var(--brass) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(231,200,105,.22);
    opacity:0; animation:fade 1s ease forwards .5s;
  }
  .title .amp{ -webkit-text-fill-color:var(--brass-bright); padding:0 .1em; }
  .tag{ font-family:'Cinzel', serif; letter-spacing:.4em; text-transform:uppercase;
    font-size:.74rem; color:var(--brass); padding-left:.4em; opacity:0; animation:fade 1s ease forwards .8s; }

  /* ---- hint ---- */
  .hint{
    position:fixed; left:50%; bottom:128px; transform:translateX(-50%); z-index:40;
    font-family:'Cinzel', serif; letter-spacing:.3em; text-transform:uppercase;
    font-size:.62rem; color:var(--brass); pointer-events:none;
    opacity:0; animation:fade 1s ease forwards 2.4s, bob 2.6s ease-in-out infinite 2.4s;
  }
  .hint.spent{ animation:fadeout .5s ease forwards; }
  @keyframes bob{ 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-5px)} }
  @keyframes fadeout{ to{ opacity:0 } }

  /* ---- envelope: z-index 50 — in front of slot-back(20), behind slot-front(60) ---- */
  /* At rest: bottom 31px hidden behind slot-front body, top 65px visible above the slit  */
  .envelope{
    position:fixed; left:50%; bottom:20px; z-index:50;
    width:150px; height:96px;
    transform:translateX(-50%); transform-origin:center bottom;
    cursor:pointer; transition:transform .4s cubic-bezier(.2,.8,.25,1), filter .4s;
    filter:drop-shadow(0 -4px 10px rgba(0,0,0,.4));
  }
  .envelope.initial{ animation:rise-in 1s ease 2.2s backwards; }
  .envelope:hover{ transform:translateX(-50%) translateY(-12px); filter:drop-shadow(0 -6px 14px rgba(0,0,0,.5)); }
  .envelope.posting{ animation:post .9s cubic-bezier(.6,0,.4,1) forwards; cursor:default; pointer-events:none; }
  .envelope.rising{ animation:rise .85s cubic-bezier(.2,.8,.25,1) both; cursor:default; pointer-events:none; }
  @keyframes rise-in{ 0%{opacity:0;transform:translateX(-50%) translateY(90px)} 100%{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes post{
    /* push straight down into slot-front body */
    0%  { transform:translateX(-50%) translateY(0);    opacity:1 }
    72% { transform:translateX(-50%) translateY(72px); opacity:1 }
    100%{ transform:translateX(-50%) translateY(90px); opacity:0 }
  }
  @keyframes rise{ 0%{opacity:0;transform:translateX(-50%) translateY(90px)} 100%{opacity:1;transform:translateX(-50%) translateY(0)} }
  .env-body{
    position:absolute; inset:0; border-radius:7px;
    background:linear-gradient(165deg,#faf3e0,#e9dcbe);
    border:1px solid var(--brass-deep);
  }
  .env-flap{
    position:absolute; top:0; left:0; right:0; height:62%;
    background:linear-gradient(180deg,#f3e8cc,#e2d4b0);
    clip-path:polygon(0 0,100% 0,50% 100%);
    border-bottom:1px solid rgba(156,123,30,.4);
  }
  .env-seal{
    position:absolute; left:50%; top:46%; transform:translate(-50%,-50%);
    width:28px; height:28px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #8a3030, #5e1f1f 70%);
    box-shadow:0 1px 3px rgba(0,0,0,.45), inset 0 0 6px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    color:var(--brass-bright); font-family:'Cinzel', serif; font-size:.56rem;
  }

  /* ---- slot-back: thin top strip containing the slit (BEHIND envelope, z-index 20) ---- */
  /* The envelope peeks above this; the slit is visible around the envelope body */
  .slot-back{
    position:fixed; left:50%; bottom:51px; z-index:20; transform:translateX(-50%);
    width:min(340px,88vw); height:19px;
    background:linear-gradient(180deg,#edd285,#c8a030);
    border-radius:11px 11px 0 0;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.5);
    opacity:0; animation:fade 1s ease forwards 1s;
  }
  /* top half of the slot oval — on slot-back (behind envelope) */
  .slit{
    position:absolute; bottom:0; left:50%; transform:translateX(-50%);
    width:62%; height:9px; border-radius:6px 6px 0 0; background:#1a1105;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.95);
  }

  /* ---- slot-front: tall bottom body (IN FRONT of envelope, z-index 60) ---- */
  /* Covers the envelope's lower half — gives the illusion of it entering the slot */
  .slot-front{
    position:fixed; left:50%; bottom:0; z-index:60; transform:translateX(-50%);
    width:min(340px,88vw); height:51px;
    background:linear-gradient(180deg,#c8a030,#9c7b1e 80%);
    box-shadow:inset 0 3px 5px rgba(0,0,0,.25), inset 0 -4px 9px rgba(0,0,0,.3), 0 -6px 22px rgba(0,0,0,.5);
    opacity:0; animation:fade 1s ease forwards 1s;
  }
  /* bottom half of the slot oval — on slot-front (in front of envelope) */
  .slit-btm{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:62%; height:9px; border-radius:0 0 6px 6px; background:#1a1105;
    box-shadow:inset 0 -2px 4px rgba(0,0,0,.95);
  }
  .slot-label{
    position:absolute; left:0; right:0; bottom:12px; text-align:center;
    font-family:'Cinzel', serif; font-weight:600; letter-spacing:.32em;
    text-transform:uppercase; font-size:.62rem; color:#5c4711;
    text-shadow:0 1px 0 rgba(255,255,255,.4);
  }

  @keyframes fade{ to{ opacity:1 } }
  @keyframes pop{ to{ opacity:1; transform:scale(1) } }

  @media (prefers-reduced-motion:reduce){
    *{ animation-duration:.001s !important; animation-delay:0s !important; }
    .crest .ring-text,.bg,.bg2{ animation:none !important; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg2"></div>
<div class="grain"></div>
<div class="sprinkles" id="sprinkles"></div>

<main class="wrap">
  <div class="crest">
    <svg viewBox="0 0 240 240" role="img" aria-label="The Kat and Alan Club crest, established New York 2018">
      <defs>
        <path id="ring" d="M120,120 m-92,0 a92,92 0 1,1 184,0 a92,92 0 1,1 -184,0" />
        <radialGradient id="seal" cx="50%" cy="40%" r="65%">
          <stop offset="0%" stop-color="#1d4a36"/><stop offset="100%" stop-color="#0a2017"/>
        </radialGradient>
      </defs>
      <circle cx="120" cy="120" r="116" fill="none" stroke="#9c7b1e" stroke-width="2"/>
      <circle cx="120" cy="120" r="108" fill="url(#seal)" stroke="#cda434" stroke-width="3"/>
      <circle cx="120" cy="120" r="74" fill="none" stroke="#9c7b1e" stroke-width="1.5"/>
      <g class="ring-text" fill="#e7c869" font-family="Cinzel, serif" font-weight="600" letter-spacing="3">
        <text font-size="13"><textPath href="#ring" startOffset="3%">THE KAT &amp; ALAN CLUB</textPath></text>
        <text font-size="13"><textPath href="#ring" startOffset="62%">&#9733; EST. 2018 &#9733;</textPath></text>
      </g>
      <g transform="translate(120,120)" fill="#e7c869" text-anchor="middle">
        <text y="6" font-family="'Cinzel Decorative', serif" font-weight="900" font-size="46" letter-spacing="1">K&amp;A</text>
        <text y="40" font-size="16" letter-spacing="6" fill="#cda434">&#9733;&#9733;</text>
      </g>
    </svg>
  </div>

  <h1 class="title">The Kat <span class="amp">&amp;</span> Alan Club</h1>
  <p class="tag">Established New York &middot; 2018</p>
</main>

<div class="hint" id="hint">Post a letter &#8595;</div>

<!-- envelope peeks out of the slit — behind slot-front(60), in front of slot-back(20) -->
<div class="envelope initial" id="envelope" title="Drop us a line">
  <div class="env-body"></div>
  <div class="env-flap"></div>
  <div class="env-seal">K&amp;A</div>
</div>

<div class="slot-back"><div class="slit"></div></div>
<div class="slot-front"><div class="slit-btm"></div><div class="slot-label">Members' Post</div></div>

<script>
  var EMAIL = 'hello@katandalan.club';
  var PEEK_BACK_MS = 15000; // how long the envelope stays posted before peeking up again

  // confetti sprinkles
  (function(){
    var box = document.getElementById('sprinkles');
    var colors = ['#e7c869','#f3ead2','#e8746c','#5fb89a','#c98ed1','#67b7d4','#cda434'];
    var n = window.innerWidth < 640 ? 40 : 70;
    for (var i=0;i<n;i++){
      var s = document.createElement('div'); s.className='spr';
      s.style.left = Math.random()*100 + 'vw';
      s.style.background = colors[(Math.random()*colors.length)|0];
      var dur = 6 + Math.random()*9;
      s.style.animationDuration = dur+'s'; s.style.animationDelay = (-Math.random()*dur)+'s';
      var w = 3 + Math.random()*4;
      s.style.width = w+'px'; s.style.height = (w*2.6)+'px';
      if (Math.random()<.3){ s.style.borderRadius='50%'; s.style.height=w+'px'; }
      box.appendChild(s);
    }
  })();

  // envelope: drop into the slot, wait, then peek back up
  (function(){
    var env  = document.getElementById('envelope');
    var hint = document.getElementById('hint');
    var busy = false, lastMail = 0;

    env.addEventListener('animationend', function(e){
      if(e.animationName === 'rise-in') env.classList.remove('initial');
    });

    env.addEventListener('click', function(){
      if (busy) return;
      busy = true;
      env.classList.remove('initial');
      hint.classList.add('spent');
      env.classList.add('posting');

      var now = Date.now();
      if (now - lastMail > 1200){ lastMail = now; setTimeout(function(){ window.location.href = 'mailto:'+EMAIL; }, 400); }

      env.addEventListener('animationend', function dropped(){
        env.removeEventListener('animationend', dropped);
        // stay posted (hidden) for a while, then peek back up
        setTimeout(function(){
          env.classList.remove('posting');
          env.classList.add('rising');
          env.addEventListener('animationend', function risen(){
            env.removeEventListener('animationend', risen);
            env.classList.remove('rising');
            busy = false;
          });
        }, PEEK_BACK_MS);
      });
    });
  })();

  // click burst
  document.addEventListener('click', function(e){
    var colors = ['#e7c869','#f3ead2','#e8746c','#5fb89a','#c98ed1','#67b7d4','#cda434'];
    var n = 15 + Math.random()*15;
    var cont = document.createElement('div');
    document.body.appendChild(cont);
    for(var i=0; i<n; i++){
      var s = document.createElement('div');
      s.className = 'burst-spr';
      s.style.left = e.clientX + 'px';
      s.style.top = e.clientY + 'px';
      s.style.background = colors[(Math.random()*colors.length)|0];
      var angle = Math.random() * Math.PI * 2;
      var velocity = 60 + Math.random() * 80;
      s.style.setProperty('--tx', (Math.cos(angle) * velocity) + 'px');
      s.style.setProperty('--ty', (Math.sin(angle) * velocity + 50) + 'px');
      s.style.setProperty('--rot', ((Math.random() - 0.5) * 720) + 'deg');
      var w = 3 + Math.random()*4;
      s.style.width = w+'px'; s.style.height = (w*2.6)+'px';
      if (Math.random()<.3){ s.style.borderRadius='50%'; s.style.height=w+'px'; }
      cont.appendChild(s);
    }
    setTimeout(function(){ if(cont.parentNode) cont.parentNode.removeChild(cont); }, 900);
  });
</script>
</body>
</html>
